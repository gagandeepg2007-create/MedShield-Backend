server.port=8080

# 1. Database Connection Logic
# Uses Docker 'db' host if available, otherwise defaults to localhost for IntelliJ
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/medshield_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Admin@123

# 2. Hibernate Settings (Auto-table creation)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Ensure the web server stays active
spring.main.web-application-type=servlet